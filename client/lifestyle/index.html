<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lifestyle & Medical Interventions - Bloom After</title>
  <link rel="icon" type="image/x-icon" href="../assets/logo/favicon.png" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layouts.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/resources.css" />
  <link rel="stylesheet" href="../css/lifestyle.css" />
</head>
<body>
  <div id="navbar-root"></div>

  <main id="main-content">
    
    <section class="resources-hero" style="background-image: url('https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=1400&q=80')" aria-labelledby="lm-hero-heading">
      <div class="resources-hero-content container">
        <h1 class="resources-hero-title" id="lm-hero-heading">Lifestyle & Medical Interventions</h1>
        <p class="resources-hero-subtitle">A holistic approach combining supportive lifestyle adjustments with evidence-based clinical care.</p>
      </div>
    </section>

    <section class="page-controls" aria-label="Search and filter">
      <div class="container page-controls-inner">
        <div class="search-wrap">
          <input type="search" id="lm-search" class="search-input" placeholder="Search strategies..." />
        </div>
        <nav class="filter-tabs" aria-label="Category filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="lifestyle">Lifestyle</button>
          <button class="filter-btn" data-filter="medical">Medical</button>
        </nav>
      </div>
    </section>

    <section class="resources-grid-section container" aria-label="Interventions Grid">
      
      <div id="lm-grid" class="lm-cards-grid" aria-live="polite"></div>
      
      <p id="lm-empty" class="empty-state" hidden>
        <strong>No strategies found.</strong><br />
        Try adjusting your search or filters.
      </p>

      <div id="pagination" class="pagination-wrap" aria-live="polite"></div>

    </section>
  </main>

  <footer id="footer-root"></footer>
  
  <script type="module" src="../js/pages/lifestyle-page.js"></script>
</body>
</html>
