<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Moderate story submissions for Bloom After." />
    <title>Stories Moderation - Bloom Admin</title>
    <link rel="icon" type="image/x-icon" href="../../../assets/logo/favicon.png" />
    <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/layouts.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
    <link rel="stylesheet" href="../../../css/admin-dashboard.css" />
    <link rel="stylesheet" href="../../../css/admin-moderation.css" />
  </head>
  <body>
    <div class="admin-layout">

      <div id="sidebar-root"></div>

      <div class="admin-main">
        <div id="topbar-root"></div>

        <main class="dashboard-content" id="main-content">

          <!-- Page header -->
          <div class="mod-page-header">
            <div>
              <h1 class="mod-page-title">Stories</h1>
              <p class="mod-page-subtitle">Review and moderate community story submissions.</p>
            </div>
            <div id="mod-header-stats" class="mod-header-stats" aria-live="polite"></div>
          </div>

          <!-- Status filter tabs -->
          <div class="mod-filters" role="tablist" aria-label="Filter stories by status">
            <button class="mod-filter-tab active" role="tab" aria-selected="true"  data-status=""          aria-controls="stories-list">All</button>
            <button class="mod-filter-tab"        role="tab" aria-selected="false" data-status="pending"   aria-controls="stories-list">Pending</button>
            <button class="mod-filter-tab"        role="tab" aria-selected="false" data-status="approved"  aria-controls="stories-list">Approved</button>
            <button class="mod-filter-tab"        role="tab" aria-selected="false" data-status="rejected"  aria-controls="stories-list">Rejected</button>
          </div>

          <!-- Search -->
          <div class="mod-search-wrap">
            <svg class="mod-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              type="search"
              id="mod-search"
              class="mod-search-input"
              placeholder="Search by name, location, or keyword…"
              aria-label="Search stories"
              autocomplete="off"
            />
          </div>

          <!-- Stories list -->
          <div
            id="stories-list"
            class="mod-story-list"
            role="tabpanel"
            aria-live="polite"
            aria-atomic="false"
          ></div>

          <!-- Empty state -->
          <p id="stories-empty" class="mod-empty" hidden role="status"></p>

          <!-- Pagination -->
          <div id="mod-pagination" class="pagination-wrap" aria-live="polite"></div>

        </main>
      </div>

    </div>

    <div id="footer-root"></div>
    <script type="module" src="../../../js/pages/stories-moderation.js"></script>
  </body>
</html>
