<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse bite-sized, trusted information to help you understand postpartum depression, recognise its signs, and explore support and recovery options." />
    <title>Resource Hub - Bloom After</title>
    <link rel="icon" type="image/x-icon" href="../assets/logo/favicon.png" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layouts.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/resources.css" />
  </head>
  <body>

    <a href="#main-content" class="visually-hidden">Skip to main content</a>

    <div id="navbar-root"></div>

    <main id="main-content">

      <!-- Hero banner -->
      <section
        class="resources-hero"
        style="background-image: url('https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=1400&q=80')"
        aria-labelledby="resources-hero-heading"
      >
        <div class="resources-hero-content container">
          <h1 class="resources-hero-title" id="resources-hero-heading">Resource Hub</h1>
          <p class="resources-hero-subtitle">
            Browse bite-sized, trusted information to help you understand postpartum depression,
            recognise its signs, and explore support and recovery options.
          </p>
        </div>
      </section>

      <!-- Search & filters -->
      <div class="resources-controls" role="search">
        <div class="container resources-controls-inner">

          <div class="search-wrap">
            <span class="search-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </span>
            <input
              type="search"
              id="search-input"
              class="search-input"
              placeholder="Search by keyword, topic, or question"
              aria-label="Search resources"
              autocomplete="off"
            />
          </div>

          <nav class="filter-tabs" aria-label="Filter resources by type">
            <button
              class="filter-btn active"
              data-filter=""
              aria-pressed="true"
              aria-label="Show all resource types"
            >
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              All
            </button>
            <button class="filter-btn" data-filter="article" aria-pressed="false">Articles</button>
            <button class="filter-btn" data-filter="infographic" aria-pressed="false">Infographics</button>
            <button class="filter-btn" data-filter="audio" aria-pressed="false">Audio Summary</button>
            <button class="filter-btn" data-filter="podcast" aria-pressed="false">Podcasts</button>
            <button class="filter-btn" data-filter="myth-busting" aria-pressed="false">Myth-busting guides</button>
          </nav>

        </div>
      </div>

      <!-- Resource grid -->
      <section class="resources-grid-section" aria-labelledby="resources-list-label">
        <div class="container">
          <h2 class="visually-hidden" id="resources-list-label">Resources</h2>

          <div
            id="resources-grid"
            class="resources-grid"
            aria-live="polite"
            aria-atomic="false"
          ></div>

          <p id="resources-empty" class="resources-empty" hidden role="status">
            <strong>No resources found.</strong><br />
            Try a different search term or filter.
          </p>

          <div id="pagination" class="pagination-wrap" aria-live="polite"></div>
        </div>
      </section>

      <!-- Crisis strip -->
      <div id="crisis-root"></div>

    </main>

    <!-- Footer -->
    <div id="footer-root"></div>

    <script type="module" src="../js/pages/resources-page.js"></script>
  </body>
</html>
