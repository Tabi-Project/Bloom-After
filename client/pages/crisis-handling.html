<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crisis Handling -Bloom After</title>
    <link rel="icon" type="image/x-icon" href="../assets/logo/favicon.png" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layouts.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/resources.css" />
    <link rel="stylesheet" href="../css/suggest-drawer.css" />
  </head>
  <body>
    <a href="#main-content" class="visually-hidden">Skip to main content</a>

    <div id="navbar-root"></div>

    <main id="main-content">
      <section
        class="resources-hero"
        style="
          background-image: url(&quot;https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=1400&q=80&quot;);
        "
        aria-labelledby="resources-hero-heading"
      >
        <div class="resources-hero-content container">
          <h1 class="resources-hero-title" id="resources-hero-heading">
            Resource Hub
          </h1>
          <p class="resources-hero-subtitle">
            Browse bite-sized, trusted information to help you understand
            postpartum depression, recognise its signs, and explore support and
            recovery options.
          </p>
        </div>
      </section>

      <section class="container">
        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </span>
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search by keyword, topic, or question"
            aria-label="Search resources"
            autocomplete="off"
          />
        </div>
      </section>
    </main>
    <div id="footer-root"></div>

    <script type="module">
      import { initSuggestDrawer } from "../js/components/suggest-drawer.js";
      import { renderFooter } from "../js/components/footer.js";
      import { renderNavbar, initNavbar } from "../js/components/navbar.js";
      initSuggestDrawer();
      document.getElementById("navbar-root").innerHTML =
        renderNavbar("crisis-handling");
      initNavbar();
      document.getElementById("footer-root").innerHTML = renderFooter();
    </script>
  </body>
</html>
