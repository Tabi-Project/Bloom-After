<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Submission Received - Bloom After</title>
    <link rel="icon" type="image/x-icon" href="../assets/logo/favicon.png" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layouts.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/resources.css" />
    <link rel="stylesheet" href="../css/stories.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  </head>
  <body>
    <a href="#main-content" class="visually-hidden">Skip to main content</a>
    <main id="main-content" class="review-page">

      <div class="success-banner">
        <span class="material-symbols-outlined success-banner-icon" aria-hidden="true">check_circle</span>
        <div>
          <h1 class="page-title">Story submitted!</h1>
          <p class="review-subtitle">Your story is now under review. We&rsquo;ll let you know within 48 hours.</p>
        </div>
      </div>

      <article class="resource-card review-card-large" aria-labelledby="success-title">
        <figure class="resource-card-image" id="success-image-wrap">
          <img id="success-image" src="" alt="Submitted story image" />
        </figure>
        <div class="resource-card-body">
          <div class="review-tags" id="success-tags-wrap" aria-label="Topics that helped"></div>
          <h2 id="success-title" class="resource-card-title review-name"></h2>
          <p class="review-body" id="success-excerpt"></p>
          <div class="review-author">
            <div class="review-avatar" aria-hidden="true">
              <span class="material-symbols-outlined">person</span>
            </div>
            <span class="review-author-name"></span>
            <span class="review-author-meta"></span>
          </div>
        </div>
      </article>

      <div class="form-actions review-actions">
        <a href="/stories" class="btn btn-secondary">Back to Stories</a>
        <button id="submit-another" type="button" class="btn btn-primary">Submit another story</button>
      </div>

      <section class="submit-footer">@Bloom After, 2026</section>

    </main>

    <!-- Footer -->
    <div id="footer-root"></div>

    <script type="module" src="../js/pages/submit-success.js"></script>
  </body>
</html>
