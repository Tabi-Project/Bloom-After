<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Submission Received - Bloom After</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layouts.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/stories.css" />
  </head>
  <body>
    <main id="main-content" class="submit-layout">
      <div class="center-column">
        <header class="breadcrumb">
          <a href="stories.html" class="back-link">Stories</a>
          <span class="divider">/</span>
          <span class="current">Submitted</span>
        </header>

        <h1 class="page-title">Thanks — your story has been submitted</h1>

        <article class="success-card">
          <div class="success-visual">
            <img id="success-image" src="" alt="Submitted image preview" />
          </div>
          <h2 id="success-name"></h2>
          <p id="success-excerpt"></p>

          <nav class="form-actions">
            <a id="to-stories" class="btn" href="stories.html">Back to Stories</a>
            <button id="submit-another" class="btn btn-primary">Submit another</button>
          </nav>
        </article>

        <section class="submit-footer">@Bloom After, 2026</section>
      </div>
    </main>

    <script type="module" src="../js/pages/submit-success.js"></script>
  </body>
</html>
