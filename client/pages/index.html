<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bloom After - a safe, clinically grounded space for navigating postpartum depression." />
    <title>Bloom After</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layouts.css" />
    <link rel="stylesheet" href="../css/components.css" />
  </head>
  <body>
    <a href="#main-content" class="visually-hidden">Skip to main content</a>

    <div id="navbar-root"></div>

    <main id="main-content">
      <!-- Hero section -->
      <section class="hero container" aria-labelledby="hero-heading">

        <article class="hero-content">
          <h1 class="hero-heading" id="hero-heading">
            Ease your way back in with a community that <em>cares.</em>
          </h1>

          <p class="hero-subheading">
            A safe, clinically grounded space for navigating postpartum depression.
          </p>

          <div class="hero-actions">
            <a href="/resources.html" class="btn btn-primary">Explore Resources</a>
            <a href="/clinics.html" class="btn btn-secondary">Find Local Clinics</a>
          </div>
        </article>

        <figure class="hero-visual" aria-hidden="true">
          <div class="hero-blob-wrap">
            <!-- Replace with image if available. -->
            <svg viewBox="50 50 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Outer soft sage blob -->
              <ellipse cx="195" cy="215" rx="168" ry="158" fill="#a8cbb7" opacity="0.45" />
              <!-- Main jungle teal blob -->
              <ellipse cx="215" cy="195" rx="118" ry="128" fill="#4f8a6f" opacity="0.9" />
              <!-- Evergreen accent circle top right -->
              <circle cx="298" cy="148" r="48" fill="#002626" />
              <!-- Small sage accent bottom left -->
              <circle cx="148" cy="308" r="30" fill="#7fb8a0" opacity="0.75" />
            </svg>
          </div>
        </figure>
      </section>
    </main>


    <script type="module">
      import { renderNavbar, initNavbar } from '../js/components/navbar.js';

      // Inject navbar
      document.getElementById('navbar-root').innerHTML = renderNavbar('home');
      initNavbar();
    </script>
  </body>
</html>
